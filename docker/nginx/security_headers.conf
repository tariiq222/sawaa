# Shared security headers — included in every location block
# (Nginx add_header in a location block replaces parent server headers,
#  so these must be explicitly included in each location)

add_header X-Content-Type-Options    "nosniff"              always;
add_header X-Frame-Options           "SAMEORIGIN"           always;
add_header X-XSS-Protection          "1; mode=block"        always;
add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

# Baseline Content-Security-Policy — REPORT-ONLY at the edge so a too-strict
# edge policy cannot break the apps. The Next.js apps emit their own (more
# specific) CSP; this is a defense-in-depth backstop for any response that
# does not. Promote to enforcing `Content-Security-Policy` only after the
# report-only policy has been validated against real traffic.
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.sawaa.sa https://errors.webvue.pro; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
