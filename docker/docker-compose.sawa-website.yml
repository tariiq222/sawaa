# ⚠️ PAUSED 2026-05-08 — Sawa website is excluded from the production pipeline.
# This compose file remains for local development only (run with `docker compose -f`).
# To resume production builds: re-add `website` to .github/workflows/build-images.yml matrix
# and uncomment the `website` service in docker/docker-compose.prod.yml.

services:
  website:
    build:
      context: ..
      dockerfile: apps/website/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5200
        NEXT_PUBLIC_DEFAULT_ORG_ID: 00000000-0000-0000-0000-000000000001
    container_name: sawaa-website
    restart: unless-stopped
    ports:
      - "5204:5204"
    environment:
      NODE_ENV: production
      PORT: "5204"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:5200
      INTERNAL_API_URL: http://backend:5200
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
