name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sawaa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin123 \
            quay.io/minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter=backend prisma:generate

      - name: Run migrations
        run: pnpm --filter=backend prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public

      - name: Lint
        run: pnpm --filter=backend lint

      - name: Typecheck
        run: pnpm --filter=backend typecheck

      - name: Unit tests
        run: pnpm --filter=backend test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-jwt-access-secret-32chars-long
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-32chars-long
          JWT_OTP_SECRET: ci-jwt-otp-secret-32chars-long
          JWT_CLIENT_ACCESS_SECRET: ci-jwt-client-access-secret-32chars
          MOYASAR_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SMS_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ZOOM_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          EMAIL_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          AUTHENTICA_API_KEY: ci-authentica-key
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_BUCKET: sawaa-test
          MINIO_USE_SSL: false

      - name: E2E tests
        run: pnpm --filter=backend test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-jwt-access-secret-32chars-long
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-32chars-long
          JWT_OTP_SECRET: ci-jwt-otp-secret-32chars-long
          JWT_CLIENT_ACCESS_SECRET: ci-jwt-client-access-secret-32chars
          MOYASAR_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SMS_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ZOOM_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          EMAIL_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          AUTHENTICA_API_KEY: ci-authentica-key
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_BUCKET: sawaa-test
          MINIO_USE_SSL: false

      - name: openapi snapshot drift
        # Boot Nest just enough to regenerate openapi.json and fail if the
        # committed snapshot differs from what the current source produces.
        # Runs here (not in the dashboard job) because only this job has the
        # full backend env wired up.
        run: |
          pnpm --filter=backend run openapi:build-and-snapshot
          if ! git diff --exit-code apps/backend/openapi.json; then
            echo "::error::apps/backend/openapi.json drifted from source. Run 'pnpm openapi:sync' locally and commit."
            exit 1
          fi
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-jwt-access-secret-32chars-long
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-32chars-long
          JWT_OTP_SECRET: ci-jwt-otp-secret-32chars-long
          JWT_CLIENT_ACCESS_SECRET: ci-jwt-client-access-secret-32chars
          MOYASAR_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SMS_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ZOOM_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          EMAIL_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          AUTHENTICA_API_KEY: ci-authentica-key
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_BUCKET: sawaa-test
          MINIO_USE_SSL: false

  # ───────────────────────────────────────────────────────────────────────────
  # Dashboard
  # ───────────────────────────────────────────────────────────────────────────
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter=backend prisma:generate
          cd packages/shared && node ../../node_modules/typescript/bin/tsc -p tsconfig.json

      - name: Generate API client
        # Best-effort regen: requires a running backend to fetch /api/docs-json,
        # which this job does not spin up. The actual drift gate runs in the
        # backend job (where Nest can boot) — see "openapi snapshot drift" step.
        run: pnpm openapi:sync || true

      - name: Lint
        run: pnpm --filter=dashboard lint

      - name: Typecheck
        run: pnpm --filter=dashboard typecheck

      - name: Unit tests
        run: pnpm --filter=dashboard test

      - name: Build
        run: pnpm --filter=dashboard build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5200/api/v1

  # ───────────────────────────────────────────────────────────────────────────
  # Dashboard smoke (Playwright)
  # ───────────────────────────────────────────────────────────────────────────
  dashboard-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, dashboard]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sawaa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin123 \
            quay.io/minio/minio:latest server /data
          minio_ready=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              minio_ready=true
              break
            fi
            sleep 1
          done
          if [ "$minio_ready" != "true" ]; then
            echo "MinIO did not become healthy after 30 seconds" >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter=backend prisma:generate

      - name: Build shared packages
        run: pnpm --filter=@sawaa/shared build

      - name: Run migrations
        run: pnpm --filter=backend prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public

      - name: Seed database
        run: pnpm --filter=backend seed
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public
          MOYASAR_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SUPER_ADMIN_EMAIL: super-admin@sawaa-test.com
          SUPER_ADMIN_PASSWORD: SuperAdmin@123456

      - name: Install Playwright Chromium
        run: pnpm --filter=dashboard exec playwright install --with-deps chromium

      - name: Start backend and wait for health
        run: |
          pnpm --filter=backend exec nest start > apps/backend/backend-smoke.log 2>&1 &
          echo $! > apps/backend/backend-smoke.pid

          for i in $(seq 1 90); do
            if curl -fsS http://localhost:5200/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat apps/backend/backend-smoke.log
          exit 1
        env:
          NODE_ENV: test
          PORT: 5200
          DATABASE_URL: postgresql://test:test@localhost:5432/sawaa_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-jwt-access-secret-32chars-long
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-32chars-long
          JWT_OTP_SECRET: ci-jwt-otp-secret-32chars-long
          JWT_CLIENT_ACCESS_SECRET: ci-jwt-client-access-secret-32chars
          MOYASAR_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SMS_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ZOOM_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          EMAIL_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          AUTHENTICA_API_KEY: ci-authentica-key
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_BUCKET: sawaa-test
          MINIO_USE_SSL: false
          SUPER_ADMIN_EMAIL: super-admin@sawaa-test.com
          SUPER_ADMIN_PASSWORD: SuperAdmin@123456
          CORS_ORIGINS: http://localhost:5203
          DASHBOARD_PUBLIC_URL: http://localhost:5203
          API_PUBLIC_URL: http://localhost:5200
          PUBLIC_WEBSITE_URL: http://localhost:5205
          THROTTLER_DISABLED: true

      - name: Run dashboard smoke tests
        run: pnpm --filter=dashboard e2e:smoke
        env:
          PW_API_URL: http://localhost:5200
          PW_DASHBOARD_URL: http://localhost:5203
          NEXT_PUBLIC_API_URL: http://localhost:5200/api/v1

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-smoke-playwright-artifacts
          path: |
            apps/dashboard/playwright-report/
            apps/dashboard/test-results/
            apps/backend/backend-smoke.log
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Website
  # ───────────────────────────────────────────────────────────────────────────
  website:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter=@sawaa/website lint

      - name: Typecheck
        run: pnpm --filter=@sawaa/website typecheck

      - name: Unit tests
        run: pnpm --filter=@sawaa/website test

  # ───────────────────────────────────────────────────────────────────────────
  # Mobile
  # ───────────────────────────────────────────────────────────────────────────
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter=sawaa-mobile lint

      - name: Typecheck
        run: pnpm --filter=sawaa-mobile typecheck

      - name: Unit tests
        run: pnpm --filter=sawaa-mobile test
