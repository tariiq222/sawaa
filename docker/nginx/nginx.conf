# =============================================================================
# Deqah — Nginx Reverse Proxy Configuration
# Production-ready config for White Label clinic management platform
# =============================================================================

# Worker processes — auto-detect CPU cores
worker_processes auto;
worker_rlimit_nofile 2048;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # Core settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Max upload size (receipts, documents, profile photos)
    client_max_body_size 20M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        text/javascript
        application/xml
        application/xml+rss;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------

    # General API: 30 req/s per client IP, burst up to 50
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Auth endpoints: 5 req/s per client IP, burst up to 10
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Standard rate-limit response
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Upstream — backend NestJS application
    # -------------------------------------------------------------------------
    upstream backend {
        server backend:5100;
        keepalive 32;
    }

    

    # -------------------------------------------------------------------------
    # HTTP server — redirect all traffic to HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check (available over HTTP for Docker healthcheck)
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server — main entry point
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;
        server_tokens off;

        # -- SSL configuration ------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # -- Health check (also on HTTPS) --------------------------------------
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # -- Metrics: restrict to internal/monitoring IPs only -----------------
        location = /api/v1/metrics {
            # Allow only internal Docker network and localhost
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            include /etc/nginx/security_headers.conf;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        # -- Auth endpoints (stricter rate limit) ------------------------------
        location ~ ^/api/v1/(auth|otp)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            include /etc/nginx/security_headers.conf;

            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        # -- SSE: chatbot message streaming ------------------------------------
        location ~ ^/api/v1/chatbot/sessions/.+/messages/stream$ {
            limit_req zone=api_limit burst=50 nodelay;
            include /etc/nginx/security_headers.conf;

            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;

            # SSE-specific: disable buffering, long timeout
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # SSE headers
            add_header Cache-Control "no-cache" always;
            add_header X-Accel-Buffering "no" always;
        }

        # -- Health check endpoints — excluded from access log --------------------
        location = /api/v1/health/live {
            access_log off;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        location = /api/v1/health/ready {
            access_log off;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        # -- General API -------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            include /etc/nginx/security_headers.conf;

            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        # -- Public website (Next.js) -----------------------------------------
        # server_name is the catch-all (_). In single-tenant deployments the
        # clinic's BrandingConfig.websiteDomain points DNS at this nginx, so
        # every non-/api request is served by the website.
        # TODO(multi-domain): when multiple clinics share one nginx, template
        # this with envsubst + ${WEBSITE_DOMAIN} at container startup.
        # TODO(tls): wire Let's Encrypt/certbot once real domains are live.
        # Website not deployed — return 503 with JSON body instead of bare 502
        location / {
            include /etc/nginx/security_headers.conf;
            default_type application/json;
            return 503 '{"error":"website_not_available","message":"The public website is not yet deployed."}';
        }
    }
}
