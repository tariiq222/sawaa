name: Deploy to Dokploy
on:
  push:
    branches: [main]
jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Backend Redeploy
        run: curl -X POST "${{ secrets.DOKPLOY_BACKEND_WEBHOOK_URL }}" -H "Content-Type: application/json" --fail-with-body -d '{"redeploy":true}'
  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - run: sleep 10
      - run: curl -X POST "${{ secrets.DOKPLOY_DASHBOARD_WEBHOOK_URL }}" -H "Content-Type: application/json" --fail-with-body -d '{"redeploy":true}'
  deploy-website:
    runs-on: ubuntu-latest
    needs: deploy-dashboard
    steps:
      - run: sleep 10
      - run: curl -X POST "${{ secrets.DOKPLOY_WEBSITE_WEBHOOK_URL }}" -H "Content-Type: application/json" --fail-with-body -d '{"redeploy":true}'
